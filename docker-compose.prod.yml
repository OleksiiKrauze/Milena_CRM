version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - crm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: crm_backend
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - db
    volumes:
      - uploads_data:/app/uploads
      - backend_logs:/app/logs
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: crm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: crm_telegram_bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CRM_API_URL: http://backend:8000
      CRM_API_KEY: ${PUBLIC_API_KEY}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm_network

  # ── Voice Bot (LiveKit + OpenAI Realtime API) ──────────────────────────────

  livekit-redis:
    image: redis:7-alpine
    container_name: crm_livekit_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no  # no persistence, in-memory only
    networks:
      - crm_network

  livekit:
    image: livekit/livekit-server:latest
    container_name: crm_livekit
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml
    environment:
      # Format must be "key: secret" (with space after colon)
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./voice-bot/config/livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - "7880:7880"           # HTTP API (internal, for agent + SIP service)
      - "7881:7881/tcp"       # WebRTC TCP fallback
      - "50000-50200:50000-50200/udp"  # WebRTC UDP media
    networks:
      - crm_network

  livekit-sip:
    image: livekit/sip:latest
    container_name: crm_livekit_sip
    restart: unless-stopped
    volumes:
      - ./voice-bot/config/sip.yaml:/sip/config.yaml:ro
    ports:
      - "5060:5060/udp"       # SIP signaling (open in AWS Security Group!)
      - "5060:5060/tcp"
      - "10000-10200:10000-10200/udp"  # RTP media
    depends_on:
      - livekit
      - livekit-redis
    networks:
      - crm_network

  voice-bot:
    build:
      context: ./voice-bot/agent
      dockerfile: Dockerfile
    container_name: crm_voice_bot
    restart: unless-stopped
    environment:
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      CRM_API_URL: "http://backend:8000"
      CRM_API_KEY: "${PUBLIC_API_KEY}"
    volumes:
      - voice_recordings:/recordings
    depends_on:
      livekit:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - crm_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  nginx_logs:
    driver: local
  backend_logs:
    driver: local
  voice_recordings:
    driver: local

networks:
  crm_network:
    driver: bridge
